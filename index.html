<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexWealth — AI Wealth Management</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080c14;--bg2:#0d1220;--bg3:#141b28;--card:#111827;--card2:#1a2235;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --gold:#f0a500;--gold-dim:rgba(240,165,0,0.1);
  --emerald:#10d98a;--rose:#ff4d6d;--sky:#38bdf8;
  --txt:#eef2ff;--txt2:#8a9bbf;--txt3:#404f6b;
  --grad:linear-gradient(135deg,#f0a500,#e07a00);
  --r:12px;--r2:8px;
}
html,body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Sora',sans-serif}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}
input,select,textarea{
  font-family:'DM Sans',sans-serif;font-size:14px;
  background:var(--bg3);border:1px solid var(--border2);
  color:var(--txt);border-radius:8px;padding:10px 14px;outline:none;transition:.2s;
}
input:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(240,165,0,0.12)}
select option{background:var(--bg3)}
button{font-family:'DM Sans',sans-serif;cursor:pointer;transition:.15s}
.btn-gold{background:var(--grad);color:#000;border:none;padding:11px 22px;border-radius:8px;font-weight:600;font-size:14px}
.btn-gold:hover{opacity:.88;transform:translateY(-1px)}
.btn-gold:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-outline{background:transparent;color:var(--gold);border:1px solid var(--gold);padding:10px 20px;border-radius:8px;font-size:14px;font-weight:500}
.btn-outline:hover{background:var(--gold-dim)}
.btn-ghost{background:var(--bg3);color:var(--txt2);border:1px solid var(--border);padding:9px 16px;border-radius:8px;font-size:13px}
.btn-ghost:hover{border-color:var(--border2);color:var(--txt)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.card2{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:16px}
.tag{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:.4px}
.tg{background:rgba(240,165,0,0.12);color:#f0a500}
.te{background:rgba(16,217,138,0.1);color:#10d98a}
.tr{background:rgba(255,77,109,0.1);color:#ff4d6d}
.ts{background:rgba(56,189,248,0.1);color:#38bdf8}
.pos{color:#10d98a}.neg{color:#ff4d6d}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.fade-up{animation:fadeUp .3s ease forwards}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:214px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13.5px;color:var(--txt2);margin-bottom:2px;transition:.15s;user-select:none}
.nav-item:hover{background:var(--card);color:var(--txt)}
.nav-item.active{background:rgba(240,165,0,0.1);color:var(--gold);font-weight:500}
.main{margin-left:214px;min-height:100vh;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:50;background:rgba(8,12,20,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.page{padding:22px 24px;flex:1}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:900px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr 1fr}}
@media(max-width:620px){.g4,.g3,.g2{grid-template-columns:1fr}.sidebar{display:none}.main{margin-left:0}}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px}
.stat-label{font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;font-weight:600}
.stat-value{font-size:22px;font-weight:700;font-family:'Sora',sans-serif;line-height:1}
.stat-sub{font-size:12px;margin-top:5px}
.pbar{height:5px;border-radius:99px;background:var(--bg3);overflow:hidden}
.pfill{height:100%;border-radius:99px;background:var(--grad);transition:.5s}
.bubble{max-width:82%;padding:11px 15px;border-radius:12px;font-size:13.5px;line-height:1.65}
.b-user{background:rgba(240,165,0,0.1);border:1px solid rgba(240,165,0,0.2);margin-left:auto;border-radius:12px 12px 2px 12px}
.b-ai{background:var(--card2);border:1px solid var(--border2);border-radius:12px 12px 12px 2px}
table.dt{width:100%;border-collapse:collapse;font-size:13px}
table.dt th{padding:9px 12px;text-align:left;color:var(--txt3);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
table.dt td{padding:11px 12px;border-bottom:1px solid rgba(255,255,255,.04)}
table.dt tr:hover td{background:rgba(255,255,255,.02)}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;color:var(--txt3);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select{width:100%}
input[type=range]{-webkit-appearance:none;height:4px;background:var(--bg3);border:none;padding:0;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--gold);border:2px solid var(--bg)}
.insight{background:rgba(240,165,0,0.07);border:1px solid rgba(240,165,0,0.18);border-radius:8px;padding:11px 13px;font-size:13px;line-height:1.55;margin-bottom:9px}
.gold-text{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sdot{width:28px;height:3px;border-radius:99px;background:var(--bg3);transition:.3s}
.sdot.active{background:var(--gold)}
.sdot.done{background:rgba(240,165,0,.35)}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── Helpers ────────────────────────────────────────────────────────
const fmt  = (n, d=0) => new Intl.NumberFormat('en-IN',{style:'currency',currency:'INR',maximumFractionDigits:d}).format(n||0);
const fmtN = n => new Intl.NumberFormat('en-IN').format(Math.round(n||0));
const pct  = n => (n>=0?'+':'')+Number(n||0).toFixed(1)+'%';

const sipFV  = (monthly, ra, yrs) => { const r=ra/100/12,n=yrs*12; if(!r||!n) return monthly*n; return monthly*((Math.pow(1+r,n)-1)/r)*(1+r); };
const lumpFV = (p, ra, yrs) => p * Math.pow(1+ra/100, yrs);
const reqSIP = (target, ra, yrs) => { const r=ra/100/12,n=yrs*12; if(!r||!n) return target/(n||1); return (target*r)/((Math.pow(1+r,n)-1)*(1+r)); };

const calcHealth = (p) => {
  let s=0; const ins=[];
  const savR = p.income>0 ? (p.savings/p.income)*100 : 0;
  if(savR>=30) s+=25; else if(savR>=20){s+=18;ins.push('Boost savings rate to 30%+ for faster wealth building.')} else if(savR>=10){s+=10;ins.push('Savings rate below 20%. Review monthly expenses.')} else{s+=3;ins.push('Critical: savings rate under 10%. Prioritise building savings.')}
  const efM = p.expenses>0 ? p.emergencyFund/(p.expenses/12) : 0;
  if(efM>=6) s+=25; else if(efM>=3){s+=15;ins.push(`Emergency fund: ${efM.toFixed(1)} months. Target 6 months.`)} else{s+=5;ins.push(`Emergency fund critically low (${efM.toFixed(1)} months).`)}
  const dR = p.income>0 ? (p.debtEMI*12/p.income)*100 : 0;
  if(dR<=10) s+=25; else if(dR<=20){s+=18;ins.push('Debt ratio moderate. Work to reduce EMI burden.')} else if(dR<=35){s+=10;ins.push('High debt ratio. Prioritise repayment.')} else{s+=2;ins.push('Debt ratio critical. Consider financial counselling.')}
  const ir = p.income>0 ? p.existingInvestments/p.income : 0;
  if(ir>=2) s+=25; else if(ir>=1){s+=18;ins.push('Good start. Diversify into more asset classes.')} else if(ir>0){s+=10;ins.push('Underinvested vs income. Increase monthly investment.')} else{s+=0;ins.push('No investments yet. Start with index funds today.')}
  return { score:Math.min(100,s), insights:ins };
};

// ─── Seed Data ───────────────────────────────────────────────────────
const DEF_PROFILE = {name:'Arjun Mehta',income:1200000,expenses:600000,savings:600000,existingInvestments:800000,riskTolerance:'Moderate',emergencyFund:300000,debtEMI:8000};
const DEF_INV = [
  {id:1,name:'HDFC Mid Cap Opp Fund',type:'Mutual Fund',invested:150000,current:213000,category:'Equity',date:'2022-01-15'},
  {id:2,name:'Axis Bluechip Fund',type:'Mutual Fund',invested:100000,current:134500,category:'Equity',date:'2022-04-10'},
  {id:3,name:'Reliance Industries',type:'Stock',invested:80000,current:95200,category:'Equity',date:'2023-01-20'},
  {id:4,name:'SBI Fixed Deposit 5yr',type:'Fixed Deposit',invested:300000,current:324000,category:'Debt',date:'2021-06-01'},
  {id:5,name:'Sovereign Gold Bond',type:'Gold',invested:70000,current:84700,category:'Gold',date:'2022-09-15'},
];
const DEF_GOALS = [
  {id:1,name:'Retirement Fund',target:10000000,years:25,rate:12,icon:'🏖️'},
  {id:2,name:'Child Education',target:2500000,years:15,rate:10,icon:'🎓'},
  {id:3,name:'Home Down Payment',target:1500000,years:5,rate:8,icon:'🏠'},
];

// ─── Icons ───────────────────────────────────────────────────────────
const I = {
  dashboard: <svg width="15" height="15" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>,
  invest:    <svg width="15" height="15" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>,
  goals:     <svg width="15" height="15" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
  ai:        <svg width="15" height="15" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><path d="M12 2a4 4 0 0 1 4 4v1h1a3 3 0 0 1 0 6h-1v1a4 4 0 0 1-8 0v-1H7a3 3 0 0 1 0-6h1V6a4 4 0 0 1 4-4z"/></svg>,
  sim:       <svg width="15" height="15" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>,
  health:    <svg width="15" height="15" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>,
  settings:  <svg width="15" height="15" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
  plus:      <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2.2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  send:      <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
  trash:     <svg width="13" height="13" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>,
};

const NAV = [
  {id:'dashboard',l:'Dashboard',i:'dashboard'},
  {id:'investments',l:'Investments',i:'invest'},
  {id:'goals',l:'Goal Planner',i:'goals'},
  {id:'advisor',l:'AI Advisor',i:'ai'},
  {id:'simulator',l:'Simulator',i:'sim'},
  {id:'health',l:'Health Score',i:'health'},
];

// ─── Sidebar ─────────────────────────────────────────────────────────
function Sidebar({page, go}) {
  return (
    <aside className="sidebar">
      <div style={{padding:'18px 16px 16px',borderBottom:'1px solid var(--border)'}}>
        <div style={{display:'flex',alignItems:'center',gap:9}}>
          <div style={{width:30,height:30,borderRadius:7,background:'var(--grad)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <span style={{color:'#000',fontWeight:800,fontSize:12,fontFamily:'Sora'}}>N</span>
          </div>
          <div>
            <div style={{fontFamily:'Sora',fontWeight:700,fontSize:14,letterSpacing:'-0.4px'}}>NexWealth</div>
            <div style={{fontSize:9.5,color:'var(--txt3)',letterSpacing:'.5px'}}>AI WEALTH PLATFORM</div>
          </div>
        </div>
      </div>
      <nav style={{flex:1,padding:'12px 10px',overflowY:'auto'}}>
        {NAV.map(n => (
          <div key={n.id} className={'nav-item'+(page===n.id?' active':'')} onClick={()=>go(n.id)}>
            {I[n.i]}<span>{n.l}</span>
          </div>
        ))}
      </nav>
      <div style={{padding:'0 10px 14px',paddingTop:10,borderTop:'1px solid var(--border)'}}>
        <div className="nav-item" onClick={()=>go('onboarding')}>
          {I.settings}<span style={{fontSize:12.5}}>Profile & Settings</span>
        </div>
      </div>
    </aside>
  );
}

// ─── Topbar ──────────────────────────────────────────────────────────
function Topbar({page, profile, go}) {
  const T = {dashboard:'Dashboard',investments:'Investment Tracker',goals:'Goal Planner',advisor:'AI Wealth Advisor',simulator:'Scenario Simulator',health:'Financial Health',onboarding:'Risk Profiling'};
  return (
    <div className="topbar">
      <div>
        <div style={{fontFamily:'Sora',fontWeight:600,fontSize:15}}>{T[page]||'NexWealth'}</div>
        <div style={{fontSize:11.5,color:'var(--txt3)',marginTop:2}}>{new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{display:'flex',alignItems:'center',gap:7,background:'var(--card)',border:'1px solid var(--border)',borderRadius:99,padding:'5px 12px',fontSize:12}}>
          <div style={{width:7,height:7,borderRadius:'50%',background:'var(--emerald)',boxShadow:'0 0 6px var(--emerald)'}}></div>
          <span style={{color:'var(--txt2)'}}>Markets Live</span>
        </div>
        <div onClick={()=>go('onboarding')} style={{width:32,height:32,borderRadius:'50%',background:'var(--grad)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Sora',fontWeight:800,fontSize:13,color:'#000',cursor:'pointer'}}>
          {(profile.name||'A').charAt(0)}
        </div>
      </div>
    </div>
  );
}

// ─── Landing ─────────────────────────────────────────────────────────
function Landing({onStart}) {
  const feats = [
    {ic:'🧠',t:'AI-Powered Advice',d:'Personalized investment recommendations from your intelligent advisor'},
    {ic:'📊',t:'Smart Dashboard',d:'Track net worth, allocations, and portfolio performance'},
    {ic:'🎯',t:'Goal Planner',d:'SIP and lump-sum calculators to hit every financial milestone'},
    {ic:'🏥',t:'Health Score',d:'Instant financial health assessment with actionable improvements'},
    {ic:'📈',t:'Scenario Simulator',d:'Model different investment scenarios and project future wealth'},
    {ic:'🔒',t:'Risk Profiling',d:'Tailored portfolio strategy based on your risk tolerance'},
  ];
  return (
    <div style={{background:'var(--bg)',minHeight:'100vh'}}>
      <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center',padding:'40px 24px',background:'radial-gradient(ellipse 80% 50% at 50% -5%,rgba(240,165,0,.1),transparent)'}}>
        <div style={{marginBottom:18}}>
          <span className="tag tg" style={{fontSize:11.5}}>✦  AI-Powered Wealth Management</span>
        </div>
        <h1 style={{fontSize:'clamp(2.2rem,5.5vw,4.5rem)',fontWeight:800,lineHeight:1.08,letterSpacing:'-2px',maxWidth:700}}>
          Invest Smarter.<br/>
          <span className="gold-text">Build Wealth Faster.</span>
        </h1>
        <p style={{fontSize:'clamp(.95rem,1.8vw,1.12rem)',color:'var(--txt2)',maxWidth:520,margin:'18px auto 0',lineHeight:1.75}}>
          NexWealth combines institutional-grade analysis with AI to help you achieve financial independence — one smart decision at a time.
        </p>
        <div style={{display:'flex',gap:12,marginTop:32,flexWrap:'wrap',justifyContent:'center'}}>
          <button className="btn-gold" style={{fontSize:15,padding:'13px 30px',borderRadius:10}} onClick={onStart}>Start Your Journey →</button>
          <button className="btn-outline" style={{fontSize:15,padding:'13px 28px',borderRadius:10}}>Watch Demo</button>
        </div>
        <div style={{marginTop:44,display:'flex',gap:36,justifyContent:'center',flexWrap:'wrap'}}>
          {[['₹2.4Cr+','Wealth Tracked'],['12,000+','Smart Portfolios'],['94%','Goal Achievement'],['4.9★','User Rating']].map(([v,l])=>(
            <div key={l} style={{textAlign:'center'}}>
              <div style={{fontFamily:'Sora',fontWeight:700,fontSize:22,color:'var(--gold)'}}>{v}</div>
              <div style={{fontSize:11.5,color:'var(--txt3)',marginTop:2}}>{l}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{padding:'50px 36px',maxWidth:980,margin:'0 auto'}}>
        <h2 style={{textAlign:'center',fontSize:'clamp(1.3rem,2.5vw,1.8rem)',fontWeight:700,marginBottom:6}}>Everything you need to build wealth</h2>
        <p style={{textAlign:'center',color:'var(--txt2)',marginBottom:36,fontSize:14}}>One platform. Six powerful tools. Unlimited potential.</p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(190px,1fr))',gap:16}}>
          {feats.map(f=>(
            <div key={f.t} className="card" style={{transition:'.2s'}}
              onMouseEnter={e=>e.currentTarget.style.borderColor='rgba(240,165,0,.3)'}
              onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
              <div style={{fontSize:26,marginBottom:10}}>{f.ic}</div>
              <div style={{fontFamily:'Sora',fontWeight:600,fontSize:14,marginBottom:5}}>{f.t}</div>
              <div style={{fontSize:12.5,color:'var(--txt2)',lineHeight:1.6}}>{f.d}</div>
            </div>
          ))}
        </div>
        <div style={{textAlign:'center',marginTop:44}}>
          <button className="btn-gold" style={{fontSize:15,padding:'14px 38px',borderRadius:10}} onClick={onStart}>Get Started Free →</button>
        </div>
      </div>
    </div>
  );
}

// ─── Onboarding ──────────────────────────────────────────────────────
function Onboarding({init, onDone}) {
  const [step,setStep] = useState(0);
  const [d,setD]       = useState(init);
  const set = (k,v) => setD(p=>({...p,[k]:v}));
  const steps = ['Tell us about yourself','Income & expenses','Risk tolerance','All set!'];
  const {score} = calcHealth(d);

  return (
    <div style={{maxWidth:540,margin:'0 auto',padding:'36px 20px'}}>
      <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:26}}>
        <div style={{width:28,height:28,borderRadius:6,background:'var(--grad)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <span style={{color:'#000',fontWeight:800,fontSize:11,fontFamily:'Sora'}}>N</span>
        </div>
        <span style={{fontFamily:'Sora',fontWeight:700,fontSize:14.5}}>NexWealth</span>
      </div>
      <div style={{display:'flex',gap:7,marginBottom:22}}>
        {steps.map((_,i)=><div key={i} className={'sdot'+(i===step?' active':i<step?' done':'')}></div>)}
      </div>
      <h2 style={{fontSize:21,fontWeight:700,marginBottom:16}}>{steps[step]}</h2>

      {step===0 && (
        <div className="fade-up">
          <div className="fg"><label>Your Name</label><input value={d.name} onChange={e=>set('name',e.target.value)} placeholder="Full name"/></div>
          <div className="fg"><label>Emergency Fund (₹)</label><input type="number" value={d.emergencyFund} onChange={e=>set('emergencyFund',+e.target.value)}/></div>
          <div className="fg"><label>Existing Investments (₹)</label><input type="number" value={d.existingInvestments} onChange={e=>set('existingInvestments',+e.target.value)}/></div>
          <div className="fg"><label>Monthly Debt / EMI (₹)</label><input type="number" value={d.debtEMI} onChange={e=>set('debtEMI',+e.target.value)}/></div>
        </div>
      )}
      {step===1 && (
        <div className="fade-up">
          <div className="fg"><label>Annual Income (₹)</label><input type="number" value={d.income} onChange={e=>set('income',+e.target.value)}/></div>
          <div className="fg"><label>Annual Expenses (₹)</label><input type="number" value={d.expenses} onChange={e=>set('expenses',+e.target.value)}/></div>
          <div className="fg">
            <label>Annual Savings (₹)</label>
            <input type="number" value={d.savings} onChange={e=>set('savings',+e.target.value)}/>
            {d.income>0 && <div style={{fontSize:11,color:'var(--txt3)',marginTop:4}}>Savings rate: {((d.savings/d.income)*100).toFixed(1)}%</div>}
          </div>
        </div>
      )}
      {step===2 && (
        <div className="fade-up">
          {['Conservative','Moderate','Aggressive'].map(r=>{
            const active = d.riskTolerance===r;
            const descs = {Conservative:'Safety first. 6–8% returns. Low equity.',Moderate:'Balanced growth & safety. 10–12% returns.',Aggressive:'High growth, high volatility. 14–18% returns.'};
            const allocs = {Conservative:'20% Equity · 60% Debt · 20% Gold',Moderate:'60% Equity · 30% Debt · 10% Gold',Aggressive:'80% Equity · 15% Debt · 5% Gold'};
            const tagCls = {Conservative:'ts',Moderate:'tg',Aggressive:'tr'};
            return (
              <div key={r} onClick={()=>set('riskTolerance',r)}
                style={{padding:14,borderRadius:12,marginBottom:10,cursor:'pointer',transition:'.2s',
                  border: '1px solid '+(active?'var(--gold)':'var(--border)'),
                  background: active?'rgba(240,165,0,0.08)':'var(--card)'}}>
                <div style={{fontWeight:600,fontSize:14.5,marginBottom:3}}>{r}</div>
                <div style={{fontSize:12.5,color:'var(--txt2)',marginBottom:7}}>{descs[r]}</div>
                <span className={'tag '+tagCls[r]} style={{fontSize:10}}>{allocs[r]}</span>
              </div>
            );
          })}
        </div>
      )}
      {step===3 && (
        <div className="fade-up">
          <div style={{background:'rgba(240,165,0,0.07)',border:'1px solid rgba(240,165,0,.25)',borderRadius:12,padding:18,marginBottom:18}}>
            <div style={{fontSize:32,marginBottom:8}}>✅</div>
            <h3 style={{fontFamily:'Sora',fontSize:16,marginBottom:4}}>Profile Created!</h3>
            <p style={{color:'var(--txt2)',fontSize:13}}>Your {d.riskTolerance} risk profile dashboard is ready.</p>
          </div>
          <div className="g2">
            {[['Annual Income',fmt(d.income)],['Savings Rate',((d.savings/d.income)*100).toFixed(1)+'%'],['Risk Profile',d.riskTolerance],['Health Score',score+'/100']].map(([l,v])=>(
              <div key={l} className="stat-card">
                <div className="stat-label">{l}</div>
                <div className="stat-value" style={{fontSize:17}}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{display:'flex',gap:10,marginTop:22}}>
        {step>0 && <button className="btn-ghost" onClick={()=>setStep(s=>s-1)}>← Back</button>}
        <button className="btn-gold" style={{flex:1}} onClick={()=>step<3?setStep(s=>s+1):onDone(d)}>
          {step<2?'Continue →':step===2?'Build Profile →':'Go to Dashboard →'}
        </button>
      </div>
    </div>
  );
}

// ─── Dashboard ───────────────────────────────────────────────────────
function Dashboard({profile, investments}) {
  const lineRef = useRef(null); const lineChart = useRef(null);
  const pieRef  = useRef(null); const pieChart  = useRef(null);

  const totInv = investments.reduce((a,i)=>a+i.invested,0);
  const totCur = investments.reduce((a,i)=>a+i.current,0);
  const gain   = totCur - totInv;
  const gPct   = totInv>0 ? (gain/totInv)*100 : 0;
  const nw     = profile.savings + totCur + profile.emergencyFund;
  const savR   = profile.income>0 ? (profile.savings/profile.income)*100 : 0;
  const {score, insights} = calcHealth(profile);
  const cats = investments.reduce((a,i)=>{a[i.category]=(a[i.category]||0)+i.current;return a},{});

  useEffect(()=>{
    if(!lineRef.current) return;
    if(lineChart.current) { lineChart.current.destroy(); lineChart.current=null; }
    const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    lineChart.current = new Chart(lineRef.current,{
      type:'line',
      data:{labels:mo,datasets:[{data:mo.map((_,i)=>Math.round(nw*(0.74+i*.024))),borderColor:'#f0a500',backgroundColor:'rgba(240,165,0,0.07)',borderWidth:2.2,fill:true,tension:.4,pointRadius:0,pointHoverRadius:5,pointHoverBackgroundColor:'#f0a500'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'  '+fmt(c.raw)}}},scales:{x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#404f6b',font:{size:11}}},y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#404f6b',font:{size:10},callback:v=>'₹'+(v>=100000?(v/100000).toFixed(0)+'L':(v/1000).toFixed(0)+'K')}}}}
    });
    return ()=>{ if(lineChart.current){lineChart.current.destroy();lineChart.current=null;} };
  },[]);

  useEffect(()=>{
    if(!pieRef.current) return;
    if(pieChart.current) { pieChart.current.destroy(); pieChart.current=null; }
    pieChart.current = new Chart(pieRef.current,{
      type:'doughnut',
      data:{labels:Object.keys(cats),datasets:[{data:Object.values(cats),backgroundColor:['#f0a500','#10d98a','#38bdf8','#ff4d6d'],borderWidth:0,hoverOffset:5}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.label}: ${fmt(c.raw)}`}}}}
    });
    return ()=>{ if(pieChart.current){pieChart.current.destroy();pieChart.current=null;} };
  },[]);

  return (
    <div className="page fade-up">
      <div className="g4" style={{marginBottom:16}}>
        {[
          {l:'Total Net Worth',v:fmt(nw),c:'+12.4% YTD',pos:true},
          {l:'Portfolio Value',v:fmt(totCur),c:pct(gPct),pos:gPct>=0},
          {l:'Total Gains',v:fmt(gain),c:pct(gPct)+' returns',pos:gain>=0},
          {l:'Savings Rate',v:savR.toFixed(1)+'%',c:savR>=20?'On Track ✓':'Below Target',pos:savR>=20},
        ].map(s=>(
          <div key={s.l} className="stat-card" style={{borderTop:'2px solid '+(s.pos?'#10d98a':'#ff4d6d')}}>
            <div className="stat-label">{s.l}</div>
            <div className="stat-value">{s.v}</div>
            <div className={'stat-sub '+(s.pos?'pos':'neg')}>{s.c}</div>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 260px',gap:14,marginBottom:14}}>
        <div className="card">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <div>
              <div style={{fontFamily:'Sora',fontWeight:600,fontSize:14.5}}>Portfolio Growth</div>
              <div style={{fontSize:11.5,color:'var(--txt3)'}}>12-month trajectory</div>
            </div>
            <span className="tag te">{pct(gPct)}</span>
          </div>
          <div style={{position:'relative',height:185}}><canvas ref={lineRef}></canvas></div>
        </div>
        <div className="card">
          <div style={{fontFamily:'Sora',fontWeight:600,fontSize:14.5,marginBottom:3}}>Asset Allocation</div>
          <div style={{fontSize:11.5,color:'var(--txt3)',marginBottom:10}}>Current breakdown</div>
          <div style={{position:'relative',height:115}}><canvas ref={pieRef}></canvas></div>
          <div style={{marginTop:10,display:'flex',flexDirection:'column',gap:5}}>
            {Object.entries(cats).map(([k,v],i)=>(
              <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:12}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <div style={{width:8,height:8,borderRadius:2,background:['#f0a500','#10d98a','#38bdf8','#ff4d6d'][i]}}></div>
                  <span style={{color:'var(--txt2)'}}>{k}</span>
                </div>
                <span style={{fontWeight:500}}>{totCur>0?((v/totCur)*100).toFixed(0):0}%</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 244px',gap:14}}>
        <div className="card">
          <div style={{fontFamily:'Sora',fontWeight:600,fontSize:14.5,marginBottom:12}}>AI Insights</div>
          {insights.map((ins,i)=>(<div key={i} className="insight">💡 {ins}</div>))}
          {totCur>0 && ((cats['Equity']||0)/totCur)<0.5 && <div className="insight">⚠️ You are underinvested in equity. Consider raising to 50–60%.</div>}
          {!cats['Gold'] && <div className="insight">➕ No gold in portfolio. 5–10% allocation acts as inflation hedge.</div>}
        </div>
        <div className="card" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center'}}>
          <div style={{fontSize:11,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.6px',marginBottom:10}}>Financial Health</div>
          <div style={{position:'relative',width:108,height:108,marginBottom:12}}>
            <svg viewBox="0 0 100 100" width="108" height="108">
              <circle cx="50" cy="50" r="42" fill="none" stroke="var(--bg3)" strokeWidth="9"/>
              <circle cx="50" cy="50" r="42" fill="none" stroke={score>=70?'#10d98a':score>=40?'#f0a500':'#ff4d6d'} strokeWidth="9"
                strokeDasharray={((score/100)*(2*3.14159*42)).toFixed(1)+' '+(2*3.14159*42).toFixed(1)}
                strokeLinecap="round" transform="rotate(-90 50 50)"/>
            </svg>
            <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
              <div style={{fontFamily:'Sora',fontWeight:800,fontSize:28,color:score>=70?'#10d98a':score>=40?'#f0a500':'#ff4d6d',lineHeight:1}}>{score}</div>
              <div style={{fontSize:9.5,color:'var(--txt3)'}}>/ 100</div>
            </div>
          </div>
          <div style={{fontFamily:'Sora',fontWeight:600,fontSize:13,marginBottom:3}}>
            {score>=80?'Excellent 🌟':score>=60?'Good 👍':score>=40?'Fair 📈':'Needs Work ⚠️'}
          </div>
          <div style={{fontSize:12,color:'var(--txt2)'}}>{score>=70?'Strong financial path!':'Room for improvement'}</div>
        </div>
      </div>
    </div>
  );
}

// ─── Investments ─────────────────────────────────────────────────────
function Investments({investments, setInvestments}) {
  const [showAdd,setShowAdd] = useState(false);
  const [form,setForm] = useState({name:'',type:'Mutual Fund',invested:'',current:'',category:'Equity',date:new Date().toISOString().slice(0,10)});
  const barRef  = useRef(null);
  const barInst = useRef(null);

  const tot    = investments.reduce((a,i)=>a+i.current,0);
  const totInv = investments.reduce((a,i)=>a+i.invested,0);
  const totG   = tot - totInv;
  const cats   = investments.reduce((a,i)=>{a[i.category]=(a[i.category]||0)+i.current;return a},{});

  useEffect(()=>{
    if(!barRef.current) return;
    if(barInst.current){barInst.current.destroy();barInst.current=null;}
    barInst.current = new Chart(barRef.current,{
      type:'bar',
      data:{labels:investments.map(i=>i.name.length>14?i.name.slice(0,14)+'…':i.name),
        datasets:[
          {label:'Invested',data:investments.map(i=>i.invested),backgroundColor:'rgba(255,255,255,0.07)',borderRadius:3},
          {label:'Current',data:investments.map(i=>i.current),backgroundColor:'rgba(240,165,0,0.72)',borderRadius:3},
        ]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${fmt(c.raw)}`}}},
        scales:{x:{grid:{display:false},ticks:{color:'#404f6b',font:{size:10}}},y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#404f6b',font:{size:10},callback:v=>fmt(v)}}}}
    });
    return ()=>{ if(barInst.current){barInst.current.destroy();barInst.current=null;} };
  },[investments.length]);

  const addInv = () => {
    if(!form.name||!form.invested||!form.current) return;
    setInvestments(p=>[...p,{...form,id:Date.now(),invested:+form.invested,current:+form.current}]);
    setForm({name:'',type:'Mutual Fund',invested:'',current:'',category:'Equity',date:new Date().toISOString().slice(0,10)});
    setShowAdd(false);
  };

  return (
    <div className="page fade-up">
      <div className="g3" style={{marginBottom:16}}>
        <div className="stat-card"><div className="stat-label">Total Invested</div><div className="stat-value">{fmt(totInv)}</div></div>
        <div className="stat-card"><div className="stat-label">Current Value</div><div className="stat-value">{fmt(tot)}</div></div>
        <div className="stat-card" style={{borderTop:'2px solid '+(totG>=0?'#10d98a':'#ff4d6d')}}>
          <div className="stat-label">Total Gain / Loss</div>
          <div className="stat-value" style={{color:totG>=0?'var(--emerald)':'var(--rose)'}}>{fmt(totG)}</div>
          <div className={'stat-sub '+(totG>=0?'pos':'neg')}>{totInv>0?pct((totG/totInv)*100):'—'}</div>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 248px',gap:14,marginBottom:16}}>
        <div className="card">
          <div style={{fontFamily:'Sora',fontWeight:600,fontSize:14.5,marginBottom:12}}>Performance Overview</div>
          <div style={{position:'relative',height:188}}><canvas ref={barRef}></canvas></div>
          <div style={{display:'flex',gap:14,marginTop:8}}>
            {[['rgba(255,255,255,.1)','Invested'],['rgba(240,165,0,.7)','Current Value']].map(([c,l])=>(
              <div key={l} style={{display:'flex',alignItems:'center',gap:5,fontSize:12,color:'var(--txt2)'}}>
                <div style={{width:9,height:9,borderRadius:2,background:c}}></div>{l}
              </div>
            ))}
          </div>
        </div>
        <div className="card">
          <div style={{fontFamily:'Sora',fontWeight:600,fontSize:14.5,marginBottom:14}}>By Category</div>
          {Object.entries(cats).map(([cat,val])=>(
            <div key={cat} style={{marginBottom:13}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12.5,marginBottom:5}}>
                <span style={{color:'var(--txt2)'}}>{cat}</span><span style={{fontWeight:500}}>{fmt(val)}</span>
              </div>
              <div className="pbar"><div className="pfill" style={{width:tot>0?((val/tot)*100)+'%':'0%'}}></div></div>
            </div>
          ))}
          <div style={{marginTop:14,paddingTop:12,borderTop:'1px solid var(--border)'}}>
            {tot>0&&((cats['Equity']||0)/tot)<0.5&&<div style={{fontSize:12,color:'var(--gold)'}}>↗ Consider raising equity to 60%</div>}
            {!cats['Gold']&&<div style={{fontSize:12,color:'var(--txt2)',marginTop:5}}>➕ Add gold as inflation hedge</div>}
          </div>
        </div>
      </div>

      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div style={{fontFamily:'Sora',fontWeight:600,fontSize:14.5}}>Holdings</div>
          <button className="btn-gold" style={{padding:'7px 14px',fontSize:12.5,display:'flex',alignItems:'center',gap:5}} onClick={()=>setShowAdd(s=>!s)}>
            {I.plus} Add Investment
          </button>
        </div>

        {showAdd && (
          <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:12,padding:14,marginBottom:14}}>
            <div className="g2">
              <div className="fg"><label>Name</label><input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="Fund / Stock name"/></div>
              <div className="fg"><label>Type</label>
                <select value={form.type} onChange={e=>setForm(p=>({...p,type:e.target.value}))}>
                  {['Mutual Fund','Stock','Fixed Deposit','Gold','Real Estate','Crypto','Other'].map(t=><option key={t}>{t}</option>)}
                </select>
              </div>
              <div className="fg"><label>Category</label>
                <select value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))}>
                  {['Equity','Debt','Gold','Real Estate','Alternate'].map(t=><option key={t}>{t}</option>)}
                </select>
              </div>
              <div className="fg"><label>Date</label><input type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))}/></div>
              <div className="fg"><label>Invested (₹)</label><input type="number" value={form.invested} onChange={e=>setForm(p=>({...p,invested:e.target.value}))} placeholder="0"/></div>
              <div className="fg"><label>Current Value (₹)</label><input type="number" value={form.current} onChange={e=>setForm(p=>({...p,current:e.target.value}))} placeholder="0"/></div>
            </div>
            <div style={{display:'flex',gap:8,marginTop:4}}>
              <button className="btn-gold" style={{padding:'7px 18px',fontSize:12.5}} onClick={addInv}>Save Investment</button>
              <button className="btn-ghost" style={{padding:'7px 14px',fontSize:12.5}} onClick={()=>setShowAdd(false)}>Cancel</button>
            </div>
          </div>
        )}

        <div style={{overflowX:'auto'}}>
          <table className="dt">
            <thead>
              <tr><th>Investment</th><th>Type</th><th>Category</th><th style={{textAlign:'right'}}>Invested</th><th style={{textAlign:'right'}}>Current</th><th style={{textAlign:'right'}}>Gain/Loss</th><th style={{textAlign:'right'}}>Returns</th><th style={{textAlign:'right'}}>Weight</th><th></th></tr>
            </thead>
            <tbody>
              {investments.map(inv=>{
                const g=inv.current-inv.invested, r=inv.invested>0?(g/inv.invested)*100:0;
                return (
                  <tr key={inv.id}>
                    <td><div style={{fontWeight:500}}>{inv.name}</div><div style={{fontSize:10.5,color:'var(--txt3)'}}>{inv.date}</div></td>
                    <td><span className="tag ts" style={{fontSize:10}}>{inv.type}</span></td>
                    <td><span className="tag tg" style={{fontSize:10}}>{inv.category}</span></td>
                    <td style={{textAlign:'right',color:'var(--txt2)'}}>{fmt(inv.invested)}</td>
                    <td style={{textAlign:'right',fontWeight:500}}>{fmt(inv.current)}</td>
                    <td style={{textAlign:'right',color:g>=0?'var(--emerald)':'var(--rose)',fontWeight:500}}>{g>=0?'+':''}{fmt(g)}</td>
                    <td style={{textAlign:'right',color:r>=0?'var(--emerald)':'var(--rose)'}}>{pct(r)}</td>
                    <td style={{textAlign:'right',color:'var(--txt2)',fontSize:12}}>{tot>0?((inv.current/tot)*100).toFixed(1):0}%</td>
                    <td><button onClick={()=>setInvestments(p=>p.filter(x=>x.id!==inv.id))} style={{background:'transparent',border:'none',color:'var(--txt3)',padding:'4px',cursor:'pointer'}}>{I.trash}</button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── Goals ───────────────────────────────────────────────────────────
function Goals({goals, setGoals}) {
  const [showAdd,setShowAdd] = useState(false);
  const [sel,setSel] = useState(goals[0]?.id||null);
  const [form,setForm] = useState({name:'',icon:'🎯',target:'',years:'',rate:12});
  const chartRef  = useRef(null);
  const chartInst = useRef(null);

  const goal    = goals.find(g=>g.id===sel);
  const sipReq  = goal ? reqSIP(goal.target,goal.rate,goal.years) : 0;
  const lumpReq = goal ? goal.target/Math.pow(1+goal.rate/100,goal.years) : 0;

  useEffect(()=>{
    if(!chartRef.current||!goal) return;
    if(chartInst.current){chartInst.current.destroy();chartInst.current=null;}
    const lbls = Array.from({length:goal.years+1},(_,i)=>i===0?'Now':`Yr ${i}`);
    chartInst.current = new Chart(chartRef.current,{
      type:'line',
      data:{labels:lbls,datasets:[
        {label:'SIP Growth',data:lbls.map((_,i)=>Math.round(sipFV(sipReq,goal.rate,i))),borderColor:'#f0a500',backgroundColor:'rgba(240,165,0,.06)',borderWidth:2,fill:true,tension:.4,pointRadius:0},
        {label:'Lump Sum',data:lbls.map((_,i)=>Math.round(lumpFV(lumpReq,goal.rate,i))),borderColor:'#10d98a',backgroundColor:'rgba(16,217,138,.05)',borderWidth:2,fill:true,tension:.4,pointRadius:0},
        {label:'Target',data:lbls.map(()=>goal.target),borderColor:'rgba(255,77,109,.5)',borderWidth:1.5,borderDash:[5,4],pointRadius:0,fill:false},
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${fmt(c.raw)}`}}},
        scales:{x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#404f6b',font:{size:11}}},y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#404f6b',font:{size:10},callback:v=>`₹${(v/100000).toFixed(0)}L`}}}}
    });
    return ()=>{ if(chartInst.current){chartInst.current.destroy();chartInst.current=null;} };
  },[sel,goals.length]);

  const addGoal = () => {
    if(!form.name||!form.target||!form.years) return;
    const ng = {id:Date.now(),...form,target:+form.target,years:+form.years,rate:+form.rate};
    setGoals(p=>[...p,ng]); setSel(ng.id);
    setForm({name:'',icon:'🎯',target:'',years:'',rate:12}); setShowAdd(false);
  };

  return (
    <div className="page fade-up">
      <div style={{display:'grid',gridTemplateColumns:'268px 1fr',gap:14}}>
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div style={{fontFamily:'Sora',fontWeight:600,fontSize:14.5}}>My Goals</div>
            <button className="btn-gold" style={{padding:'6px 11px',fontSize:12,display:'flex',alignItems:'center',gap:4}} onClick={()=>setShowAdd(s=>!s)}>
              {I.plus} Add
            </button>
          </div>
          {showAdd && (
            <div className="card" style={{padding:13,marginBottom:10}}>

              </div>

              <div className="fg"><label>Target (₹)</label><input type="number" value={form.target} onChange={e=>setForm(p=>({...p,target:e.target.value}))} placeholder="1500000"/></div>

                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div style={{display:'flex',gap:9,alignItems:'center'}}>
                    <span style={{fontSize:20}}>{g.icon}</span>
                    <div>
                      <div style={{fontWeight:600,fontSize:13.5}}>{g.name}</div>
                      <div style={{fontSize:11,color:'var(--txt3)'}}>{g.years} yrs · {g.rate}% p.a.</div>
                    </div>
                  </div>
                  <button onClick={e=>{e.stopPropagation();setGoals(p=>p.filter(x=>x.id!==g.id));if(sel===g.id)setSel(null);}} style={{background:'transparent',border:'none',color:'var(--txt3)',cursor:'pointer',fontSize:14}}>×</button>
                </div>
                <div style={{marginTop:9,display:'flex',flexDirection:'column',gap:3}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:12}}><span style={{color:'var(--txt2)'}}>Target</span><span style={{fontWeight:600}}>{fmt(g.target)}</span></div>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:12}}><span style={{color:'var(--txt2)'}}>Monthly SIP</span><span style={{color:'var(--gold)',fontWeight:600}}>{fmt(s)}</span></div>
                </div>

        {goal ? (
          <div>

                  <div>
                    <h2 style={{fontFamily:'Sora',fontWeight:700,fontSize:18}}>{goal.name}</h2>
                    <div style={{color:'var(--txt2)',fontSize:12.5}}>Target {fmt(goal.target)} in {goal.years} years at {goal.rate}% p.a.</div>
                  </div>
                </div>
                <span className="tag tg">Active Goal</span>
              </div>
              <div className="g2" style={{marginBottom:14}}>
                <div style={{background:'var(--bg2)',border:'1px solid rgba(240,165,0,.2)',borderRadius:12,padding:14,textAlign:'center'}}>
                  <div style={{fontSize:10.5,color:'var(--txt3)',marginBottom:4,textTransform:'uppercase',letterSpacing:'.4px'}}>Monthly SIP Required</div>
                  <div style={{fontFamily:'Sora',fontWeight:800,fontSize:24,color:'var(--gold)'}}>{fmt(sipReq)}</div>
                  <div style={{fontSize:11,color:'var(--txt2)',marginTop:3}}>every month</div>
                </div>
                <div style={{background:'var(--bg2)',border:'1px solid rgba(16,217,138,.2)',borderRadius:12,padding:14,textAlign:'center'}}>
                  <div style={{fontSize:10.5,color:'var(--txt3)',marginBottom:4,textTransform:'uppercase',letterSpacing:'.4px'}}>One-Time Lump Sum</div>
                  <div style={{fontFamily:'Sora',fontWeight:800,fontSize:24,color:'var(--emerald)'}}>{fmt(lumpReq)}</div>
                  <div style={{fontSize:11,color:'var(--txt2)',marginTop:3}}>invest today</div>
                </div>
              </div>
              <div style={{position:'relative',height:205}}><canvas ref={chartRef}></canvas></div>
              <div style={{display:'flex',gap:16,marginTop:10,justifyContent:'center'}}>
                {[['#f0a500','SIP Strategy'],['#10d98a','Lump Sum'],['rgba(255,77,109,.5)','Target']].map(([c,l])=>(
                  <div key={l} style={{display:'flex',alignItems:'center',gap:5,fontSize:11.5,color:'var(--txt2)'}}>

                  </div>

            <div className="card" style={{padding:14}}>
              <div style={{fontFamily:'Sora',fontWeight:600,fontSize:14,marginBottom:10}}>Goal Summary</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
                {[['Total SIP Invested',fmt(sipReq*goal.years*12)],['Lump Sum Gain',fmt(goal.target-lumpReq)],['Wealth Multiplier',lumpReq>0?(goal.target/lumpReq).toFixed(1)+'x':'—']].map(([l,v])=>(
                  <div key={l} style={{background:'var(--bg2)',borderRadius:8,padding:10,textAlign:'center'}}>
                    <div style={{fontSize:10,color:'var(--txt3)',marginBottom:3}}>{l}</div>

            <div style={{fontSize:36}}>🎯</div>
            <div style={{fontFamily:'Sora',fontWeight:600,fontSize:15}}>Select or create a goal</div>
            <div style={{fontSize:13,color:'var(--txt2)'}}>Start planning your financial milestones</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── AI Advisor ──────────────────────────────────────────────────────
function Advisor({profile, investments, goals, apiKey, setApiKey}) {
  const totCur = investments.reduce((a,i)=>a+i.current,0);
  const initMsg = `Hello ${profile.name||'there'}! I'm your NexWealth AI Advisor.\n\nYour financial profile is loaded:\n• Risk Profile: ${profile.riskTolerance}\n• Savings Rate: ${profile.income>0?((profile.savings/profile.income)*100).toFixed(1):0}%\n• Portfolio Value: ${fmt(totCur)}\n• Health Score: ${calcHealth(profile).score}/100\n\nAsk me anything about investing, tax planning, or reaching your goals!`;
  const [msgs,setMsgs]       = useState([{role:'assistant',content:initMsg}]);
  const [input,setInput]     = useState('');
  const [loading,setLoading] = useState(false);
  const [showKey,setShowKey] = useState(false);
  const bottomRef            = useRef(null);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:'smooth'}); },[msgs]);

  const SYSTEM = `You are NexWealth AI, a professional financial advisor for young Indian investors. Focus on goal-based planning, risk management, and long-term wealth building.\n\nUser: ${profile.name}, Income ₹${fmtN(profile.income)}/yr, Expenses ₹${fmtN(profile.expenses)}/yr, Savings rate ${profile.income>0?((profile.savings/profile.income)*100).toFixed(1):0}%, Risk: ${profile.riskTolerance}, Emergency fund ${profile.expenses>0?(profile.emergencyFund/(profile.expenses/12)).toFixed(1):0} months, Health score ${calcHealth(profile).score}/100.\nInvestments: ${investments.map(i=>`${i.name}: ₹${fmtN(i.invested)} invested, ₹${fmtN(i.current)} current`).join('; ')}.\nGoals: ${goals.map(g=>`${g.name} ₹${fmtN(g.target)} in ${g.years}yr`).join('; ')}.\n\nGive clear, structured, actionable advice. Use bullet points. Mention specific Indian instruments (HDFC, Axis, Nifty 50 index, ELSS, PPF, NPS, SGB). Be concise yet comprehensive.`;

  const doSend = async (text) => {
    const msg = text || input;
    if(!msg.trim()||loading) return;
    const uMsg = {role:'user',content:msg};
    setMsgs(m=>[...m,uMsg]); setInput(''); setLoading(true);
    try {
      const history = [...msgs, uMsg].map(m=>({
        role: m.role==='assistant'?'model':'user',
        parts:[{text:m.content}]
      }));
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          system_instruction:{parts:[{text:SYSTEM}]},
          contents: history
        })
      });
      const data = await res.json();
      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text
        || data.error?.message
        || 'Could not respond. Please check your Gemini API key (🔑 button).';
      setMsgs(m=>[...m,{role:'assistant',content:reply}]);
    } catch {
      setMsgs(m=>[...m,{role:'assistant',content:'Connection error. Click 🔑 to enter your Gemini API key, then try again.'}]);
    }
    setLoading(false);
  };

  const quick = ['Suggest portfolio allocation for my risk profile','How to invest ₹50K/month wisely?','Best ELSS funds for tax saving?','Review my emergency fund adequacy'];

  const renderMsg = (text) => text.split('\n').map((line,i)=>{
    if(!line.trim()) return <br key={i}/>;
    if(line.startsWith('• ')||line.startsWith('- ')) return <div key={i} style={{paddingLeft:14,position:'relative',marginTop:2}}><span style={{position:'absolute',left:2,color:'var(--gold)'}}>•</span>{line.replace(/^[•\-] /,'')}</div>;
    return <div key={i} style={{lineHeight:1.65}}>{line}</div>;
  });

  return (
    <div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 69px)'}}>
      <div style={{flex:1,overflowY:'auto',padding:'18px 22px',display:'flex',flexDirection:'column',gap:13}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:'flex',gap:10,justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
            {m.role==='assistant'&&(
              <div style={{width:30,height:30,borderRadius:'50%',background:'var(--grad)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:3}}>
                <span style={{color:'#000',fontSize:11,fontWeight:800}}>N</span>
              </div>
            )}
            <div className={'bubble '+(m.role==='user'?'b-user':'b-ai')}>{renderMsg(m.content)}</div>
          </div>
        ))}
        {loading&&(
          <div style={{display:'flex',gap:10}}>
            <div style={{width:30,height:30,borderRadius:'50%',background:'var(--grad)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <span style={{color:'#000',fontSize:11,fontWeight:800}}>N</span>
            </div>
            <div className="bubble b-ai" style={{display:'flex',gap:5,alignItems:'center'}}>
              {[0,.2,.4].map(d=>(
                <div key={d} style={{width:6,height:6,borderRadius:'50%',background:'var(--gold)',animation:`blink 1s ${d}s infinite`}}></div>
              ))}
            </div>
          </div>
        )}
        <div ref={bottomRef}></div>
      </div>
      {msgs.length<3&&(
        <div style={{padding:'0 22px 12px',display:'flex',gap:7,flexWrap:'wrap'}}>
          {quick.map(q=>(
            <button key={q} className="btn-ghost" style={{fontSize:11.5,padding:'6px 11px',borderRadius:99}} onClick={()=>doSend(q)}>{q}</button>
          ))}
        </div>
      )}
      {showKey&&(
        <div style={{padding:'0 22px 10px',display:'flex',gap:8}}>
          <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="Anthropic API key (sk-ant-...)" style={{flex:1}}/>
          <button className="btn-gold" style={{padding:'8px 14px',fontSize:12}} onClick={()=>setShowKey(false)}>Save</button>
        </div>
      )}
      <div style={{display:'flex',gap:8,padding:'12px 22px',borderTop:'1px solid var(--border)',background:'var(--bg2)'}}>
        <input value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}}}
          placeholder="Ask me anything about your finances…" style={{flex:1}}/>
        <button onClick={()=>setShowKey(s=>!s)} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:8,padding:'9px 11px',color:'var(--txt3)',cursor:'pointer',fontSize:13}}>🔑</button>
        <button className="btn-gold" style={{padding:'9px 18px',display:'flex',alignItems:'center',gap:6,flexShrink:0}} onClick={()=>doSend()} disabled={loading}>
          {I.send} Send
        </button>
      </div>
    </div>
  );
}

// ─── Simulator ───────────────────────────────────────────────────────
function Simulator() {
  const [monthly,setMonthly]     = useState(20000);
  const [rate,setRate]           = useState(12);
  const [inflation,setInflation] = useState(6);
  const [years,setYears]         = useState(20);
  const chartRef  = useRef(null);
  const chartInst = useRef(null);

  const nomFV  = sipFV(monthly,rate,years);
  const realFV = nomFV/Math.pow(1+inflation/100,years);
  const inv    = monthly*years*12;

  useEffect(()=>{
    if(!chartRef.current) return;
    if(chartInst.current){chartInst.current.destroy();chartInst.current=null;}
    const lbls = Array.from({length:years+1},(_,i)=>i===0?'Now':`Yr ${i}`);
    chartInst.current = new Chart(chartRef.current,{
      type:'line',
      data:{labels:lbls,datasets:[
        {label:'Nominal',data:lbls.map((_,i)=>Math.round(sipFV(monthly,rate,i))),borderColor:'#f0a500',backgroundColor:'rgba(240,165,0,.07)',borderWidth:2.5,fill:true,tension:.4,pointRadius:0},
        {label:'Real (Inflation Adj.)',data:lbls.map((_,i)=>Math.round(sipFV(monthly,rate,i)/Math.pow(1+inflation/100,i))),borderColor:'#38bdf8',backgroundColor:'rgba(56,189,248,.05)',borderWidth:2,fill:true,tension:.4,pointRadius:0,borderDash:[6,3]},
        {label:'Total Invested',data:lbls.map((_,i)=>monthly*i*12),borderColor:'rgba(255,255,255,.18)',borderWidth:1.5,fill:false,tension:0,pointRadius:0},
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${fmt(c.raw)}`}}},
        scales:{x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#404f6b',font:{size:11},maxTicksLimit:9}},
                y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#404f6b',font:{size:10},callback:v=>{
                  if(v>=10000000) return '₹'+(v/10000000).toFixed(1)+'Cr';
                  if(v>=100000) return '₹'+(v/100000).toFixed(0)+'L';
                  return '₹'+(v/1000).toFixed(0)+'K';
                }}}}}
    });
    return ()=>{ if(chartInst.current){chartInst.current.destroy();chartInst.current=null;} };
  },[monthly,rate,inflation,years]);

  const Slider = ({label,value,min,max,step,unit,onChange}) => (
    <div style={{marginBottom:18}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:7,fontSize:13}}>
        <span style={{color:'var(--txt2)'}}>{label}</span>
        <span style={{fontWeight:600,color:'var(--gold)'}}>{value.toLocaleString('en-IN')}{unit}</span>
      </div>
      <input type="range" min={min} max={max} step={step||1} value={value} onChange={e=>onChange(+e.target.value)} style={{width:'100%'}}/>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--txt3)',marginTop:3}}>
        <span>{min.toLocaleString('en-IN')}{unit}</span><span>{max.toLocaleString('en-IN')}{unit}</span>
      </div>
    </div>
  );

  return (
    <div className="page fade-up">
      <div style={{display:'grid',gridTemplateColumns:'285px 1fr',gap:14}}>
        <div className="card">
          <div style={{fontFamily:'Sora',fontWeight:600,fontSize:14.5,marginBottom:16}}>Parameters</div>
          <Slider label="Monthly Investment" value={monthly} min={1000} max={200000} step={1000} unit="" onChange={setMonthly}/>
          <Slider label="Expected Return" value={rate} min={4} max={24} step={0.5} unit="%" onChange={setRate}/>
          <Slider label="Inflation Rate" value={inflation} min={2} max={12} step={0.5} unit="%" onChange={setInflation}/>
          <Slider label="Time Horizon" value={years} min={1} max={40} unit=" yrs" onChange={setYears}/>
          <div style={{borderTop:'1px solid var(--border)',paddingTop:12,marginTop:4}}>
            {[['Total Invested',fmt(inv),'var(--txt2)'],['Nominal Value',fmt(nomFV),'var(--gold)'],['Real Value (Adj.)',fmt(realFV),'var(--sky)'],['Net Returns',fmt(nomFV-inv),'var(--emerald)'],['Wealth Multiple',inv>0?(nomFV/inv).toFixed(1)+'x':'—','var(--gold)']].map(([l,v,c])=>(
              <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid rgba(255,255,255,.03)'}}>
                <span style={{fontSize:12,color:'var(--txt2)'}}>{l}</span>
                <span style={{fontSize:12.5,fontWeight:600,color:c}}>{v}</span>
              </div>
            ))}
          </div>
        </div>

        <div className="card">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div>
              <div style={{fontFamily:'Sora',fontWeight:600,fontSize:14.5}}>Wealth Projection</div>
              <div style={{fontSize:11.5,color:'var(--txt3)'}}>₹{fmtN(monthly)}/mo · {years}yr · {rate}% p.a.</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontFamily:'Sora',fontWeight:800,fontSize:22,color:'var(--gold)'}}>{nomFV>=10000000?'₹'+(nomFV/10000000).toFixed(2)+'Cr':fmt(nomFV)}</div>
              <div style={{fontSize:10.5,color:'var(--txt3)'}}>projected corpus</div>
            </div>
          </div>
          <div style={{position:'relative',height:268}}><canvas ref={chartRef}></canvas></div>
          <div style={{display:'flex',gap:18,marginTop:10,justifyContent:'center'}}>
            {[['#f0a500','Nominal'],['#38bdf8','Inflation Adj.'],['rgba(255,255,255,.2)','Invested']].map(([c,l])=>(
              <div key={l} style={{display:'flex',alignItems:'center',gap:5,fontSize:11.5,color:'var(--txt2)'}}><div style={{width:18,height:2,background:c,borderRadius:1}}></div>{l}</div>
            ))}
          </div>
          <div style={{marginTop:14,borderTop:'1px solid var(--border)',paddingTop:12}}>
            <div style={{fontSize:11,color:'var(--txt3)',marginBottom:8,textTransform:'uppercase',letterSpacing:'.4px'}}>Quick Scenarios</div>
            <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
              {[{l:'Conservative',m:10000,r:8,inf:6,y:20},{l:'Moderate',m:20000,r:12,inf:6,y:20},{l:'Aggressive',m:30000,r:15,inf:6,y:20},{l:'FIRE by 45',m:50000,r:14,inf:6,y:15}].map(sc=>(
                <button key={sc.l} className="btn-ghost" style={{fontSize:12,padding:'6px 13px'}} onClick={()=>{setMonthly(sc.m);setRate(sc.r);setInflation(sc.inf);setYears(sc.y)}}>{sc.l}</button>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Health Score ─────────────────────────────────────────────────────
function HealthScore({profile, investments}) {
  const {score,insights} = calcHealth(profile);
  const savR  = profile.income>0?(profile.savings/profile.income)*100:0;
  const efM   = profile.expenses>0?profile.emergencyFund/(profile.expenses/12):0;
  const dR    = profile.income>0?(profile.debtEMI*12/profile.income)*100:0;
  const totC  = investments.reduce((a,i)=>a+i.current,0);
  const ir    = profile.income>0?totC/profile.income:0;
  const sC    = score>=70?'#10d98a':score>=40?'#f0a500':'#ff4d6d';

  const pillars = [
    {n:'Savings Rate',s:savR>=30?100:savR>=20?72:savR>=10?40:12,v:savR.toFixed(1)+'%',t:'≥ 30%',ic:'💰'},
    {n:'Emergency Fund',s:efM>=6?100:efM>=3?60:20,v:efM.toFixed(1)+' months',t:'6 months',ic:'🛡️'},
    {n:'Debt Ratio',s:dR<=10?100:dR<=20?72:dR<=35?40:8,v:dR.toFixed(1)+'%',t:'≤ 10%',ic:'⚖️'},
    {n:'Investment Cover',s:ir>=2?100:ir>=1?72:ir>0?40:0,v:fmt(totC),t:'2× income',ic:'📈'},
  ];

  const recs = [
    {ic:'💸',t:'Start ELSS SIP',d:'₹12,500/mo in ELSS → ₹1.5L tax deduction under Sec 80C',tag:'Tax Saving'},
    {ic:'🏦',t:'Build Emergency Fund',d:`Need ${Math.max(0,6-efM).toFixed(1)} more months of expenses (${fmt(Math.max(0,(6-efM)*profile.expenses/12))})`,tag:'Safety'},
    {ic:'👴',t:'Contribute to NPS',d:'₹50,000/yr Tier 1 → extra ₹50K deduction under 80CCD(1B)',tag:'Retirement'},
    {ic:'🔒',t:'Get Term Insurance',d:`Life cover of ₹${fmtN(profile.income*10)} (10× annual income)`,tag:'Protection'},
    {ic:'📊',t:'Step-up SIP 10%',d:'Increase SIP 10% each year to dramatically boost corpus',tag:'Growth'},
    {ic:'🌐',t:'Add Index Funds',d:'Nifty 50 index funds: broad market exposure at 0.1% expense ratio',tag:'Diversify'},
  ];

  return (
    <div className="page fade-up">
      <div style={{display:'grid',gridTemplateColumns:'276px 1fr',gap:14,marginBottom:14}}>
        <div className="card" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:28,textAlign:'center'}}>
          <div style={{position:'relative',width:138,height:138,marginBottom:16}}>
            <svg viewBox="0 0 100 100" width="138" height="138">
              <circle cx="50" cy="50" r="42" fill="none" stroke="var(--bg3)" strokeWidth="9"/>
              <circle cx="50" cy="50" r="42" fill="none" stroke={sC} strokeWidth="9"
                strokeDasharray={((score/100)*(2*3.14159*42)).toFixed(1)+' '+(2*3.14159*42).toFixed(1)}
                strokeLinecap="round" transform="rotate(-90 50 50)"/>
            </svg>
            <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
              <div style={{fontFamily:'Sora',fontWeight:800,fontSize:32,color:sC,lineHeight:1}}>{score}</div>
              <div style={{fontSize:10,color:'var(--txt3)'}}>/ 100</div>
            </div>
          </div>
          <div style={{fontFamily:'Sora',fontWeight:700,fontSize:17,marginBottom:5}}>
            {score>=80?'Excellent 🌟':score>=65?'Good 👍':score>=45?'Fair 📈':'Needs Work ⚠️'}
          </div>
          <div style={{fontSize:12.5,color:'var(--txt2)',lineHeight:1.65,marginBottom:16}}>
            {score>=70?'You are on a strong financial path.':score>=45?'Good foundation with room to improve.':'Significant improvements needed.'}
          </div>
          <div style={{width:'100%',background:'var(--bg3)',borderRadius:99,height:7,overflow:'hidden'}}>
            <div style={{height:'100%',borderRadius:99,background:'var(--grad)',width:score+'%',transition:'.8s'}}></div>
          </div>
        </div>

        <div>
          <div className="card" style={{marginBottom:12}}>
            <div style={{fontFamily:'Sora',fontWeight:600,fontSize:14.5,marginBottom:12}}>Score Breakdown</div>
            <div className="g2">
              {pillars.map(p=>(
                <div key={p.n} style={{background:'var(--bg2)',borderRadius:12,padding:12,border:'1px solid var(--border)'}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:7}}>
                    <div style={{display:'flex',gap:7,alignItems:'center'}}>
                      <span style={{fontSize:17}}>{p.ic}</span>
                      <div>
                        <div style={{fontSize:13,fontWeight:600}}>{p.n}</div>
                        <div style={{fontSize:10.5,color:'var(--txt3)'}}>Target: {p.t}</div>
                      </div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontFamily:'Sora',fontWeight:700,fontSize:17,color:p.s>=70?'#10d98a':p.s>=40?'#f0a500':'#ff4d6d'}}>{p.s}</div>
                      <div style={{fontSize:9.5,color:'var(--txt3)'}}>/ 100</div>
                    </div>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:11.5,marginBottom:5}}>
                    <span style={{color:'var(--txt2)'}}>Current</span><span style={{fontWeight:500}}>{p.v}</span>
                  </div>
                  <div className="pbar"><div className="pfill" style={{width:p.s+'%',background:p.s>=70?'#10d98a':p.s>=40?'var(--grad)':'#ff4d6d'}}></div></div>
                </div>
              ))}
            </div>
          </div>
          <div className="card">
            <div style={{fontFamily:'Sora',fontWeight:600,fontSize:14.5,marginBottom:10}}>Key Insights</div>
            {insights.map((ins,i)=>(<div key={i} className="insight">{ins}</div>))}
          </div>
        </div>
      </div>

      <div className="card">
        <div style={{fontFamily:'Sora',fontWeight:600,fontSize:14.5,marginBottom:12}}>Smart Recommendations</div>
        <div className="g2">
          {recs.map(r=>(
            <div key={r.t} className="card2" style={{display:'flex',gap:11,transition:'.18s'}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor='rgba(240,165,0,.3)';e.currentTarget.style.background='rgba(240,165,0,0.05)';}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.background='var(--card2)';}}>
              <span style={{fontSize:22,flexShrink:0}}>{r.ic}</span>
              <div>
                <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:3}}>
                  <span style={{fontWeight:600,fontSize:13.5}}>{r.t}</span>
                  <span className="tag tg" style={{fontSize:10}}>{r.tag}</span>
                </div>
                <div style={{fontSize:12.5,color:'var(--txt2)',lineHeight:1.55}}>{r.d}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── App Root ─────────────────────────────────────────────────────────
function App() {
  const [page,setPage]       = useState('landing');
  const [profile,setProfile] = useState(DEF_PROFILE);
  const [inv,setInv]         = useState(DEF_INV);
  const [goals,setGoals]     = useState(DEF_GOALS);
  const [apiKey,setApiKey]   = useState('');
  const [done,setDone]       = useState(false);

  if(page==='landing') return <Landing onStart={()=>setPage(done?'dashboard':'onboarding')}/>;
  if(page==='onboarding') return <Onboarding init={profile} onDone={p=>{setProfile(p);setDone(true);setPage('dashboard');}}/>;

  return (
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar page={page} go={setPage}/>
      <div className="main">
        <Topbar page={page} profile={profile} go={setPage}/>
        {page==='dashboard'   && <Dashboard   profile={profile} investments={inv}/>}
        {page==='investments' && <Investments investments={inv} setInvestments={setInv}/>}
        {page==='goals'       && <Goals       goals={goals} setGoals={setGoals}/>}
        {page==='advisor'     && <Advisor     profile={profile} investments={inv} goals={goals} apiKey={apiKey} setApiKey={setApiKey}/>}
        {page==='simulator'   && <Simulator/>}
        {page==='health'      && <HealthScore profile={profile} investments={inv}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
